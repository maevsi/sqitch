name: "Release: Scheduled"

permissions: {}

on:
  schedule:
    - cron: "0 0 * * 6" # Every Saturday at 00:00 AM UTC on the default branch
  workflow_dispatch:

jobs:
  release-schedule:
    name: "Release: Scheduled"
    uses: dargmuesli/github-actions/.github/workflows/release-schedule.yml@51cd57700bedc5b189c5dce3902645e00b4e4ccf # 5.5.3
    permissions:
      contents: read
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    with:
      IS_DEBOUNCED: ${{ github.event_name != 'workflow_dispatch' }}
